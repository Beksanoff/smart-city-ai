server {
    listen 80;
    server_name localhost;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (defined in map to inherit in all locations)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://api-maps.yandex.ru https://*.yandex.ru https://*.yandex.net https://yastatic.net https://*.yastatic.net 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.yandex.net https://*.yandex.ru https://yastatic.net https://*.yastatic.net; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.yandex.net https://*.yandex.ru https://*.maps.yandex.net https://yastatic.net https://*.yastatic.net; connect-src 'self' http://localhost:8080 http://127.0.0.1:8080 https://api-maps.yandex.ru https://*.yandex.ru https://*.yandex.net https://yastatic.net https://*.yastatic.net; worker-src 'self' blob: data:; child-src 'self' blob:; frame-src 'self' https://*.yandex.ru https://*.yandex.net;" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (inherit security headers from server block)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-add security headers since nginx replaces them in nested location
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    # Rate limiting zone (10 requests/sec per IP)
    # Note: limit_req_zone must be in http block; apply limit_req here

    # Proxy API requests to backend
    location /api {
        proxy_pass http://backend-go:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Limit request body size for API calls
        client_max_body_size 1m;
    }

    # Proxy health check
    location /health {
        proxy_pass http://backend-go:8080;
        proxy_set_header Host $host;
    }
}
